  <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

 <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 1px solid #1a3a5c;
            display: block;
        }
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #level-up-panel {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 10, 30, 0.95);
            border: 2px solid #00aaff;
            border-radius: 15px;
            padding: 30px;
            pointer-events: auto;
            z-index: 100;
            min-width: 500px;
            box-shadow: 0 0 30px rgba(0, 170, 255, 0.3);
        }
        #level-up-panel h2 {
            color: #00ddff;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            text-shadow: 0 0 10px #00aaff;
        }
        .upgrade-option {
            background: rgba(0, 50, 100, 0.5);
            border: 1px solid #005588;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .upgrade-option:hover {
            background: rgba(0, 100, 200, 0.5);
            border-color: #00aaff;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.3);
        }
        .upgrade-icon {
            font-size: 36px;
            width: 50px;
            text-align: center;
        }
        .upgrade-info h3 {
            color: #ffffff;
            margin-bottom: 5px;
            font-size: 16px;
        }
        .upgrade-info p {
            color: #88bbdd;
            font-size: 13px;
        }
        #start-screen, #death-screen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: auto;
            z-index: 200;
        }
        #start-screen h1 {
            color: #00ddff;
            font-size: 48px;
            text-shadow: 0 0 20px #0088ff, 0 0 40px #0044aa;
            margin-bottom: 10px;
        }
        #start-screen .subtitle {
            color: #6688aa;
            font-size: 18px;
            margin-bottom: 40px;
        }
        .btn {
            background: linear-gradient(180deg, #0066cc, #003366);
            color: #fff;
            border: 2px solid #0088ff;
            padding: 15px 50px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-shadow: 0 0 5px #00aaff;
        }
        .btn:hover {
            background: linear-gradient(180deg, #0088ff, #004488);
            box-shadow: 0 0 20px rgba(0, 136, 255, 0.5);
        }
        #death-screen h1 {
            color: #ff4444;
            font-size: 42px;
            text-shadow: 0 0 20px #ff0000;
            margin-bottom: 20px;
        }
        #death-screen .stats {
            color: #aaccee;
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 2;
        }
        .controls-info {
            color: #446688;
            font-size: 14px;
            margin-top: 20px;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="start-screen" style="display:flex; flex-direction:column; align-items:center;">
        <h1>❄️ 星核幸存者 ❄️</h1>
        <div class="subtitle">—— 极度深寒 ——</div>
        <button class="btn" id="startBtn">开始求生</button>
        <div class="controls-info">
            WASD / 方向键 移动 | 武器自动攻击<br>
            在冰封星球上生存，击败寒霜怪物！
        </div>
    </div>

    <div id="death-screen">
        <h1>💀 冻毙于荒原 💀</h1>
        <div class="stats" id="death-stats"></div>
        <button class="btn" id="restartBtn">再次挑战</button>
    </div>

    <div id="level-up-panel">
        <h2>⬆️ 核心升级 ⬆️</h2>
        <div id="upgrade-options"></div>
    </div>

<script>
// ==================== 游戏主体 ====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 自适应画布
function resizeCanvas() {
    canvas.width = Math.min(window.innerWidth - 20, 1200);
    canvas.height = Math.min(window.innerHeight - 20, 800);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ==================== 游戏状态 ====================
let gameState = 'menu'; // menu, playing, levelup, dead
let gameTime = 0;
let score = 0;
let killCount = 0;
let waveLevel = 1;
let frameCount = 0;
let screenShake = 0;
let particles = [];
let damageNumbers = [];
let expOrbs = [];
let snowflakes = [];

// 初始化雪花
function initSnowflakes() {
    snowflakes = [];
    for (let i = 0; i < 80; i++) {
        snowflakes.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 3 + 1,
            speed: Math.random() * 1 + 0.5,
            wind: Math.random() * 0.5 - 0.25,
            opacity: Math.random() * 0.5 + 0.3
        });
    }
}

// ==================== 按键系统 ====================
const keys = {};
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// ==================== 玩家 ====================
let player = null;

function createPlayer() {
    return {
        x: canvas.width / 2,
        y: canvas.height / 2,
        radius: 18,
        speed: 3,
        maxHp: 100,
        hp: 100,
        level: 1,
        exp: 0,
        expToNext: 10,
        armor: 0,
        hpRegen: 0.5,
        weapons: ['ice_shard'],
        weaponLevels: { ice_shard: 1 },
        lastDir: { x: 1, y: 0 },
        invincible: 0,
        coreGlow: 0,
        bodyAngle: 0,
        // 温度系统
        temperature: 100,
        maxTemperature: 100,
        tempDecayRate: 0.02,
        // 磁铁范围
        magnetRange: 80
    };
}

// ==================== 武器系统 ====================
let projectiles = [];
let weaponTimers = {};

const WEAPON_DATA = {
    ice_shard: {
        name: '寒冰碎片',
        icon: '🔷',
        desc: '向最近敌人发射冰晶碎片',
        interval: 500,
        damage: 12,
        count: 1,
        pierce: 1,
        speed: 7,
        levelUp: (lv) => {
            if (lv === 2) return { damage: 15, desc: '伤害提升' };
            if (lv === 3) return { count: 2, desc: '发射2枚' };
            if (lv === 4) return { damage: 20, pierce: 2, desc: '穿透+1，伤害提升' };
            if (lv === 5) return { count: 3, interval: 400, desc: '发射3枚，频率提升' };
        }
    },
    frost_nova: {
        name: '霜冻新星',
        icon: '💠',
        desc: '周期性释放环形冰冻冲击波',
        interval: 3000,
        damage: 25,
        radius: 120,
        levelUp: (lv) => {
            if (lv === 2) return { damage: 35, desc: '伤害提升' };
            if (lv === 3) return { radius: 160, desc: '范围扩大' };
            if (lv === 4) return { damage: 50, interval: 2500, desc: '伤害提升，冷却缩短' };
            if (lv === 5) return { radius: 200, damage: 65, desc: '范围与伤害大幅提升' };
        }
    },
    icicle_orbit: {
        name: '冰锥环绕',
        icon: '❄️',
        desc: '环绕冰锥持续伤害接近的敌人',
        interval: 800,
        damage: 8,
        count: 3,
        orbitRadius: 70,
        levelUp: (lv) => {
            if (lv === 2) return { count: 4, desc: '冰锥数+1' };
            if (lv === 3) return { damage: 12, desc: '伤害提升' };
            if (lv === 4) return { count: 5, orbitRadius: 90, desc: '冰锥数+1，轨道扩大' };
            if (lv === 5) return { count: 7, damage: 16, desc: '冰锥数+2，伤害提升' };
        }
    },
    blizzard: {
        name: '暴风雪',
        icon: '🌨️',
        desc: '随机区域降下持续伤害的暴风雪',
        interval: 4000,
        damage: 15,
        duration: 2000,
        radius: 80,
        levelUp: (lv) => {
            if (lv === 2) return { damage: 20, desc: '伤害提升' };
            if (lv === 3) return { radius: 110, desc: '范围扩大' };
            if (lv === 4) return { duration: 3000, damage: 28, desc: '持续时间和伤害提升' };
            if (lv === 5) return { radius: 140, damage: 35, desc: '终极暴风雪' };
        }
    },
    glacial_beam: {
        name: '极寒射线',
        icon: '🔵',
        desc: '向最近敌人发射持续冰冻射线',
        interval: 100,
        damage: 3,
        range: 200,
        levelUp: (lv) => {
            if (lv === 2) return { damage: 5, desc: '伤害提升' };
            if (lv === 3) return { range: 260, desc: '射程增加' };
            if (lv === 4) return { damage: 7, desc: '伤害提升' };
            if (lv === 5) return { range: 320, damage: 10, desc: '终极射线' };
        }
    }
};

function getWeaponStats(weaponId) {
    let base = { ...WEAPON_DATA[weaponId] };
    let level = player.weaponLevels[weaponId] || 1;
    for (let lv = 2; lv <= level; lv++) {
        let upgrade = base.levelUp(lv);
        if (upgrade) {
            Object.keys(upgrade).forEach(k => {
                if (k !== 'desc') base[k] = upgrade[k];
            });
        }
    }
    return base;
}

// ==================== 敌人系统 ====================
let enemies = [];

const ENEMY_TYPES = {
    frost_slime: {
        name: '寒霜史莱姆',
        radius: 15,
        speed: 1.2,
        hp: 30,
        damage: 8,
        color: '#44aadd',
        exp: 3
    },
    ice_wolf: {
        name: '冰原狼',
        radius: 14,
        speed: 2.5,
        hp: 25,
        damage: 12,
        color: '#7799bb',
        exp: 5
    },
    snow_golem: {
        name: '雪人守卫',
        radius: 25,
        speed: 0.7,
        hp: 120,
        damage: 15,
        color: '#ccddee',
        exp: 12
    },
    frost_wraith: {
        name: '冰霜幽灵',
        radius: 12,
        speed: 2.0,
        hp: 40,
        damage: 10,
        color: '#88ccff',
        exp: 6,
        phase: true
    },
    blizzard_elemental: {
        name: '暴风雪元素',
        radius: 30,
        speed: 0.5,
        hp: 300,
        damage: 20,
        color: '#4466aa',
        exp: 25,
        isBoss: true
    }
};

function spawnEnemy() {
    let types = ['frost_slime'];
    if (waveLevel >= 2) types.push('ice_wolf');
    if (waveLevel >= 3) types.push('snow_golem');
    if (waveLevel >= 4) types.push('frost_wraith');
    
    let type = types[Math.floor(Math.random() * types.length)];
    let data = ENEMY_TYPES[type];
    
    // 在画布边缘外生成
    let angle = Math.random() * Math.PI * 2;
    let dist = Math.max(canvas.width, canvas.height) * 0.6 + 50;
    
    let hpScale = 1 + (waveLevel - 1) * 0.3;
    
    enemies.push({
        type: type,
        x: player.x + Math.cos(angle) * dist,
        y: player.y + Math.sin(angle) * dist,
        radius: data.radius,
        speed: data.speed * (1 + Math.random() * 0.2),
        maxHp: Math.floor(data.hp * hpScale),
        hp: Math.floor(data.hp * hpScale),
        damage: data.damage,
        color: data.color,
        exp: data.exp,
        phase: data.phase || false,
        isBoss: data.isBoss || false,
        hitFlash: 0,
        frozen: 0,
        angle: 0,
        wobble: Math.random() * Math.PI * 2
    });
}

function spawnBoss() {
    let data = ENEMY_TYPES.blizzard_elemental;
    let angle = Math.random() * Math.PI * 2;
    let dist = Math.max(canvas.width, canvas.height) * 0.5;
    
    let hpScale = 1 + (waveLevel - 1) * 0.5;
    
    enemies.push({
        type: 'blizzard_elemental',
        x: player.x + Math.cos(angle) * dist,
        y: player.y + Math.sin(angle) * dist,
        radius: data.radius,
        speed: data.speed,
        maxHp: Math.floor(data.hp * hpScale),
        hp: Math.floor(data.hp * hpScale),
        damage: data.damage,
        color: data.color,
        exp: data.exp,
        isBoss: true,
        hitFlash: 0,
        frozen: 0,
        angle: 0,
        wobble: 0
    });
    
    screenShake = 20;
}

// ==================== 暴风雪区域 ====================
let blizzardZones = [];

// ==================== 粒子与特效 ====================
function addParticle(x, y, color, count, speed, life) {
    for (let i = 0; i < count; i++) {
        let angle = Math.random() * Math.PI * 2;
        let spd = Math.random() * speed + 0.5;
        particles.push({
            x: x,
            y: y,
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd,
            life: life || 30,
            maxLife: life || 30,
            color: color,
            size: Math.random() * 3 + 1
        });
    }
}

function addDamageNumber(x, y, value, color) {
    damageNumbers.push({
        x: x + (Math.random() - 0.5) * 20,
        y: y,
        value: Math.floor(value),
        color: color || '#ffff00',
        life: 40,
        vy: -2
    });
}

// ==================== 战斗逻辑 ====================
function findNearestEnemy(x, y, range) {
    let nearest = null;
    let minDist = range || Infinity;
    enemies.forEach(e => {
        let d = Math.hypot(e.x - x, e.y - y);
        if (d < minDist) {
            minDist = d;
            nearest = e;
        }
    });
    return nearest;
}

function fireWeapons(timestamp) {
    player.weapons.forEach(wid => {
        let stats = getWeaponStats(wid);
        if (!weaponTimers[wid]) weaponTimers[wid] = 0;
        
        if (timestamp - weaponTimers[wid] < stats.interval) return;
        weaponTimers[wid] = timestamp;
        
        if (wid === 'ice_shard') {
            let count = stats.count || 1;
            for (let i = 0; i < count; i++) {
                let target = findNearestEnemy(player.x, player.y, 500);
                let dir;
                if (target) {
                    let a = Math.atan2(target.y - player.y, target.x - player.x);
                    a += (i - (count - 1) / 2) * 0.15;
                    dir = { x: Math.cos(a), y: Math.sin(a) };
                } else {
                    let a = Math.atan2(player.lastDir.y, player.lastDir.x);
                    a += (i - (count - 1) / 2) * 0.15;
                    dir = { x: Math.cos(a), y: Math.sin(a) };
                }
                projectiles.push({
                    x: player.x,
                    y: player.y,
                    vx: dir.x * stats.speed,
                    vy: dir.y * stats.speed,
                    damage: stats.damage,
                    pierce: stats.pierce || 1,
                    pierced: [],
                    life: 80,
                    type: 'ice_shard',
                    size: 5
                });
            }
        }
        
        if (wid === 'frost_nova') {
            let radius = stats.radius || 120;
            // 对范围内敌人造成伤害
            enemies.forEach(e => {
                let d = Math.hypot(e.x - player.x, e.y - player.y);
                if (d < radius) {
                    damageEnemy(e, stats.damage);
                    e.frozen = 60;
                }
            });
            // 视觉效果
            for (let i = 0; i < 30; i++) {
                let a = (Math.PI * 2 / 30) * i;
                particles.push({
                    x: player.x + Math.cos(a) * radius * 0.3,
                    y: player.y + Math.sin(a) * radius * 0.3,
                    vx: Math.cos(a) * 3,
                    vy: Math.sin(a) * 3,
                    life: 25,
                    maxLife: 25,
                    color: '#88ddff',
                    size: 4
                });
            }
            screenShake = 5;
        }
        
        if (wid === 'blizzard') {
            let target = findNearestEnemy(player.x, player.y, 400);
            let bx, by;
            if (target) {
                bx = target.x + (Math.random() - 0.5) * 50;
                by = target.y + (Math.random() - 0.5) * 50;
            } else {
                bx = player.x + (Math.random() - 0.5) * 300;
                by = player.y + (Math.random() - 0.5) * 300;
            }
            blizzardZones.push({
                x: bx,
                y: by,
                radius: stats.radius || 80,
                damage: stats.damage,
                duration: stats.duration || 2000,
                startTime: timestamp,
                lastTick: 0
            });
        }
    });
}

function damageEnemy(enemy, damage) {
    enemy.hp -= damage;
    enemy.hitFlash = 8;
    addDamageNumber(enemy.x, enemy.y - enemy.radius, damage, '#88eeff');
    addParticle(enemy.x, enemy.y, '#aaddff', 3, 2, 15);
    
    if (enemy.hp <= 0) {
        // 掉落经验
        let orbCount = Math.ceil(enemy.exp / 3);
        for (let i = 0; i < orbCount; i++) {
            expOrbs.push({
                x: enemy.x + (Math.random() - 0.5) * 20,
                y: enemy.y + (Math.random() - 0.5) * 20,
                value: Math.ceil(enemy.exp / orbCount),
                radius: 5,
                glow: 0,
                life: 600
            });
        }
        addParticle(enemy.x, enemy.y, enemy.color, 12, 3, 25);
        killCount++;
        score += enemy.exp * 10;
    }
}

// ==================== 升级系统 ====================
function checkLevelUp() {
    while (player.exp >= player.expToNext) {
        player.exp -= player.expToNext;
        player.level++;
        player.expToNext = Math.floor(10 * Math.pow(1.35, player.level - 1));
        showLevelUpPanel();
        return;
    }
}

function showLevelUpPanel() {
    gameState = 'levelup';
    let panel = document.getElementById('level-up-panel');
    let optionsDiv = document.getElementById('upgrade-options');
    optionsDiv.innerHTML = '';
    
    let options = generateUpgradeOptions();
    options.forEach(opt => {
        let div = document.createElement('div');
        div.className = 'upgrade-option';
        div.innerHTML = `
            <div class="upgrade-icon">${opt.icon}</div>
            <div class="upgrade-info">
                <h3>${opt.name} ${opt.levelText || ''}</h3>
                <p>${opt.desc}</p>
            </div>
        `;
        div.addEventListener('click', () => {
            opt.apply();
            panel.style.display = 'none';
            gameState = 'playing';
        });
        optionsDiv.appendChild(div);
    });
    
    panel.style.display = 'block';
}

function generateUpgradeOptions() {
    let options = [];
    
    // 已有武器升级
    player.weapons.forEach(wid => {
        let lv = player.weaponLevels[wid] || 1;
        if (lv < 5) {
            let stats = WEAPON_DATA[wid];
            let nextUpgrade = stats.levelUp(lv + 1);
            if (nextUpgrade) {
                options.push({
                    icon: stats.icon,
                    name: stats.name,
                    levelText: `Lv${lv} → Lv${lv + 1}`,
                    desc: nextUpgrade.desc,
                    priority: 2,
                    apply: () => { player.weaponLevels[wid] = lv + 1; }
                });
            }
        }
    });
    
    // 新武器
    let allWeapons = Object.keys(WEAPON_DATA);
    allWeapons.forEach(wid => {
        if (!player.weapons.includes(wid) && player.weapons.length < 5) {
            let stats = WEAPON_DATA[wid];
            options.push({
                icon: stats.icon,
                name: stats.name + ' (新)',
                levelText: '',
                desc: stats.desc,
                priority: 3,
                apply: () => { 
                    player.weapons.push(wid); 
                    player.weaponLevels[wid] = 1;
                }
            });
        }
    });
    
    // 被动升级
    let passives = [
        {
            icon: '❤️', name: '生命强化', desc: '最大生命+20',
            apply: () => { player.maxHp += 20; player.hp = Math.min(player.hp + 20, player.maxHp); }
        },
        {
            icon: '🛡️', name: '冰甲护盾', desc: '护甲+2（减少受到的伤害）',
            apply: () => { player.armor += 2; }
        },
        {
            icon: '👟', name: '极地疾行', desc: '移动速度+0.5',
            apply: () => { player.speed += 0.5; }
        },
        {
            icon: '💚', name: '生命再生', desc: '每秒回复生命+0.3',
            apply: () => { player.hpRegen += 0.3; }
        },
        {
            icon: '🧲', name: '资源磁铁', desc: '拾取范围+30',
            apply: () => { player.magnetRange += 30; }
        },
        {
            icon: '🔥', name: '核心升温', desc: '温度上限+15，温度下降减缓',
            apply: () => { player.maxTemperature += 15; player.temperature += 15; player.tempDecayRate *= 0.85; }
        }
    ];
    
    passives.forEach(p => { p.priority = 1; });
    options = options.concat(passives);
    
    // 随机选3个
    options.sort(() => Math.random() - 0.5);
    // 优先显示武器
    options.sort((a, b) => b.priority - a.priority);
    return options.slice(0, 3);
}

// ==================== 游戏循环 ====================
let lastTimestamp = 0;

function gameLoop(timestamp) {
    if (!lastTimestamp) lastTimestamp = timestamp;
    let dt = timestamp - lastTimestamp;
    lastTimestamp = timestamp;
    
    if (gameState === 'playing') {
        update(timestamp, dt);
    }
    
    render(timestamp);
    requestAnimationFrame(gameLoop);
}

function update(timestamp, dt) {
    frameCount++;
    gameTime += dt;
    
    // 波次升级
    let newWave = Math.floor(gameTime / 30000) + 1;
    if (newWave > waveLevel) {
        waveLevel = newWave;
        if (waveLevel % 2 === 0) {
            spawnBoss();
        }
    }
    
    // 玩家移动
    let mx = 0, my = 0;
    if (keys['w'] || keys['arrowup']) my -= 1;
    if (keys['s'] || keys['arrowdown']) my += 1;
    if (keys['a'] || keys['arrowleft']) mx -= 1;
    if (keys['d'] || keys['arrowright']) mx += 1;
    
    if (mx !== 0 || my !== 0) {
        let len = Math.hypot(mx, my);
        mx /= len; my /= len;
        player.x += mx * player.speed;
        player.y += my * player.speed;
        player.lastDir = { x: mx, y: my };
        player.bodyAngle = Math.atan2(my, mx);
    }
    
    // 边界限制（大地图概念，但限制在较大范围）
    player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
    player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));
    
    // 温度系统
    player.temperature -= player.tempDecayRate;
    if (player.temperature <= 0) {
        player.temperature = 0;
        // 低温持续掉血
        if (frameCount % 30 === 0) {
            player.hp -= 3;
            addDamageNumber(player.x, player.y - 30, 3, '#4488ff');
        }
    }
    
    // 生命恢复
    if (frameCount % 60 === 0) {
        player.hp = Math.min(player.hp + player.hpRegen, player.maxHp);
    }
    
    // 无敌帧
    if (player.invincible > 0) player.invincible--;
    
    // 发射武器
    fireWeapons(timestamp);
    
    // 处理冰锥环绕
    if (player.weapons.includes('icicle_orbit')) {
        let stats = getWeaponStats('icicle_orbit');
        let count = stats.count || 3;
        let orbitR = stats.orbitRadius || 70;
        
        enemies.forEach(e => {
            for (let i = 0; i < count; i++) {
                let angle = (timestamp / 500) + (Math.PI * 2 / count) * i;
                let ix = player.x + Math.cos(angle) * orbitR;
                let iy = player.y + Math.sin(angle) * orbitR;
                let d = Math.hypot(e.x - ix, e.y - iy);
                if (d < e.radius + 10) {
                    if (!e._lastIcicleHit) e._lastIcicleHit = 0;
                    if (timestamp - e._lastIcicleHit > 300) {
                        damageEnemy(e, stats.damage);
                        e._lastIcicleHit = timestamp;
                    }
                }
            }
        });
    }
    
    // 极寒射线
    if (player.weapons.includes('glacial_beam')) {
        let stats = getWeaponStats('glacial_beam');
        let target = findNearestEnemy(player.x, player.y, stats.range || 200);
        if (target) {
            if (!weaponTimers['glacial_beam_tick']) weaponTimers['glacial_beam_tick'] = 0;
            if (timestamp - weaponTimers['glacial_beam_tick'] > stats.interval) {
                weaponTimers['glacial_beam_tick'] = timestamp;
                damageEnemy(target, stats.damage);
                target.frozen = 10;
            }
            // 绘制用的信息保存
            player._beamTarget = target;
        } else {
            player._beamTarget = null;
        }
    }
    
    // 更新弹幕
    projectiles = projectiles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        
        if (p.life <= 0) return false;
        if (p.x < -50 || p.x > canvas.width + 50 || p.y < -50 || p.y > canvas.height + 50) return false;
        
        // 碰撞检测
        for (let e of enemies) {
            if (p.pierced.includes(e)) continue;
            let d = Math.hypot(p.x - e.x, p.y - e.y);
            if (d < e.radius + p.size) {
                damageEnemy(e, p.damage);
                p.pierced.push(e);
                p.pierce--;
                if (p.pierce <= 0) return false;
            }
        }
        
        return true;
    });
    
    // 更新暴风雪区域
    blizzardZones = blizzardZones.filter(bz => {
        let elapsed = timestamp - bz.startTime;
        if (elapsed > bz.duration) return false;
        
        // 每0.5秒造成一次伤害
        if (timestamp - bz.lastTick > 500) {
            bz.lastTick = timestamp;
            enemies.forEach(e => {
                let d = Math.hypot(e.x - bz.x, e.y - bz.y);
                if (d < bz.radius) {
                    damageEnemy(e, bz.damage);
                    e.frozen = Math.max(e.frozen, 20);
                }
            });
        }
        
        // 暴风雪粒子
        if (frameCount % 3 === 0) {
            particles.push({
                x: bz.x + (Math.random() - 0.5) * bz.radius * 2,
                y: bz.y + (Math.random() - 0.5) * bz.radius * 2,
                vx: (Math.random() - 0.5) * 2,
                vy: Math.random() * 2 + 1,
                life: 20,
                maxLife: 20,
                color: '#ccddff',
                size: 2
            });
        }
        
        return true;
    });
    
    // 生成敌人
    let spawnRate = Math.max(300, 1500 - waveLevel * 100);
    if (frameCount % Math.floor(spawnRate / 16) === 0) {
        spawnEnemy();
    }
    
    // 限制敌人数量
    if (enemies.length > 100) {
        enemies = enemies.slice(-80);
    }
    
    // 更新敌人
    enemies = enemies.filter(e => {
        if (e.hp <= 0) return false;
        
        // 冻结减速
        let speedMult = e.frozen > 0 ? 0.3 : 1;
        if (e.frozen > 0) e.frozen--;
        
        // 移向玩家
        let dx = player.x - e.x;
        let dy = player.y - e.y;
        let dist = Math.hypot(dx, dy);
        
        if (dist > 0) {
            e.x += (dx / dist) * e.speed * speedMult;
            e.y += (dy / dist) * e.speed * speedMult;
        }
        
        e.wobble += 0.05;
        if (e.hitFlash > 0) e.hitFlash--;
        
        // 接触玩家
        if (dist < player.radius + e.radius && player.invincible <= 0) {
            let dmg = Math.max(1, e.damage - player.armor);
            player.hp -= dmg;
            player.invincible = 30;
            addDamageNumber(player.x, player.y - 30, dmg, '#ff4444');
            addParticle(player.x, player.y, '#ff6666', 8, 3, 20);
            screenShake = 8;
            
            // 击退
            if (dist > 0) {
                let pushAngle = Math.atan2(player.y - e.y, player.x - e.x);
                player.x += Math.cos(pushAngle) * 15;
                player.y += Math.sin(pushAngle) * 15;
            }
            
            // 被攻击时温度下降
            player.temperature = Math.max(0, player.temperature - 5);
        }
        
        return true;
    });
    
    // 经验球
    expOrbs = expOrbs.filter(orb => {
        orb.life--;
        if (orb.life <= 0) return false;
        
        let d = Math.hypot(orb.x - player.x, orb.y - player.y);
        // 磁铁吸引
        if (d < player.magnetRange) {
            let speed = 5 * (1 - d / player.magnetRange) + 1;
            let angle = Math.atan2(player.y - orb.y, player.x - orb.x);
            orb.x += Math.cos(angle) * speed;
            orb.y += Math.sin(angle) * speed;
        }
        
        // 拾取
        if (d < player.radius + orb.radius) {
            player.exp += orb.value;
            // 拾取经验恢复温度
            player.temperature = Math.min(player.temperature + 1, player.maxTemperature);
            addParticle(orb.x, orb.y, '#00ffaa', 4, 2, 15);
            checkLevelUp();
            return false;
        }
        
        orb.glow = (orb.glow + 0.1) % (Math.PI * 2);
        return true;
    });
    
    // 更新粒子
    particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        p.vx *= 0.96;
        p.vy *= 0.96;
        return p.life > 0;
    });
    
    // 更新伤害数字
    damageNumbers = damageNumbers.filter(d => {
        d.y += d.vy;
        d.life--;
        return d.life > 0;
    });
    
    // 更新雪花
    snowflakes.forEach(s => {
        s.y += s.speed;
        s.x += s.wind + Math.sin(frameCount * 0.01 + s.x) * 0.3;
        if (s.y > canvas.height + 10) { s.y = -10; s.x = Math.random() * canvas.width; }
        if (s.x < -10) s.x = canvas.width + 10;
        if (s.x > canvas.width + 10) s.x = -10;
    });
    
    // 屏幕震动
    if (screenShake > 0) screenShake *= 0.9;
    if (screenShake < 0.1) screenShake = 0;
    
    // 核心发光
    player.coreGlow = (player.coreGlow + 0.05) % (Math.PI * 2);
    
    // 死亡检测
    if (player.hp <= 0) {
        gameState = 'dead';
        document.getElementById('death-screen').style.display = 'block';
        document.getElementById('death-stats').innerHTML = `
            存活时间：${Math.floor(gameTime / 1000)}秒<br>
            击杀数：${killCount}<br>
            达到等级：${player.level}<br>
            分数：${score}
        `;
    }
}

// ==================== 渲染 ====================
function render(timestamp) {
    ctx.save();
    
    // 屏幕震动
    if (screenShake > 0) {
        ctx.translate(
            (Math.random() - 0.5) * screenShake,
            (Math.random() - 0.5) * screenShake
        );
    }
    
    // 背景
    drawBackground();
    
    if (gameState === 'menu') {
        ctx.restore();
        return;
    }
    
    if (player) {
        // 暴风雪区域
        blizzardZones.forEach(bz => {
            let elapsed = timestamp - bz.startTime;
            let alpha = Math.min(1, elapsed / 300) * (1 - elapsed / bz.duration);
            ctx.save();
            ctx.globalAlpha = alpha * 0.3;
            ctx.beginPath();
            ctx.arc(bz.x, bz.y, bz.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#88bbee';
            ctx.fill();
            ctx.globalAlpha = alpha * 0.6;
            ctx.strokeStyle = '#aaddff';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.restore();
        });
        
        // 经验球
        expOrbs.forEach(orb => {
            let glowSize = 1 + Math.sin(orb.glow) * 0.3;
            ctx.save();
            ctx.beginPath();
            ctx.arc(orb.x, orb.y, orb.radius * glowSize + 4, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 255, 170, 0.2)';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(orb.x, orb.y, orb.radius * glowSize, 0, Math.PI * 2);
            let gradient = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, orb.radius * glowSize);
            gradient.addColorStop(0, '#88ffcc');
            gradient.addColorStop(1, '#00aa66');
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.restore();
        });
        
        // 敌人
        enemies.forEach(e => {
            drawEnemy(e, timestamp);
        });
        
        // 弹幕
        projectiles.forEach(p => {
            drawProjectile(p);
        });
        
        // 冰锥环绕
        if (player.weapons.includes('icicle_orbit')) {
            let stats = getWeaponStats('icicle_orbit');
            let count = stats.count || 3;
            let orbitR = stats.orbitRadius || 70;
            for (let i = 0; i < count; i++) {
                let angle = (timestamp / 500) + (Math.PI * 2 / count) * i;
                let ix = player.x + Math.cos(angle) * orbitR;
                let iy = player.y + Math.sin(angle) * orbitR;
                
                ctx.save();
                ctx.translate(ix, iy);
                ctx.rotate(angle + Math.PI / 2);
                ctx.beginPath();
                ctx.moveTo(0, -10);
                ctx.lineTo(-5, 8);
                ctx.lineTo(5, 8);
                ctx.closePath();
                ctx.fillStyle = '#aaddff';
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.restore();
            }
        }
        
        // 极寒射线
        if (player.weapons.includes('glacial_beam') && player._beamTarget) {
            let target = player._beamTarget;
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(target.x, target.y);
            ctx.strokeStyle = `rgba(100, 200, 255, ${0.6 + Math.sin(timestamp / 100) * 0.3})`;
            ctx.lineWidth = 3 + Math.sin(timestamp / 80) * 2;
            ctx.stroke();
            ctx.strokeStyle = `rgba(200, 240, 255, ${0.8 + Math.sin(timestamp / 100) * 0.2})`;
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.restore();
        }
        
        // 玩家
        drawPlayer(timestamp);
        
        // 粒子
        particles.forEach(p => {
            let alpha = p.life / p.maxLife;
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        });
        
        // 伤害数字
        damageNumbers.forEach(d => {
            let alpha = d.life / 40;
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.font = `bold ${14 + (1 - alpha) * 6}px Arial`;
            ctx.fillStyle = d.color;
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.textAlign = 'center';
            ctx.strokeText(d.value, d.x, d.y);
            ctx.fillText(d.value, d.x, d.y);
            ctx.restore();
        });
        
        // 雪花（前景）
        ctx.save();
        snowflakes.forEach(s => {
            ctx.globalAlpha = s.opacity;
            ctx.fillStyle = '#ddeeff';
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.restore();
        
        // UI
        drawUI();
    }
    
    ctx.restore();
}

function drawBackground() {
    // 深色冰冻背景
    let gradient = ctx.createRadialGradient(
        canvas.width / 2, canvas.height / 2, 0,
        canvas.width / 2, canvas.height / 2, canvas.width * 0.7
    );
    gradient.addColorStop(0, '#0a1a2e');
    gradient.addColorStop(0.5, '#061225');
    gradient.addColorStop(1, '#030a15');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 冰冻地面纹理
    ctx.save();
    ctx.globalAlpha = 0.03;
    for (let i = 0; i < 15; i++) {
        let x = ((i * 137 + frameCount * 0.1) % (canvas.width + 200)) - 100;
        let y = ((i * 211 + 50) % (canvas.height + 200)) - 100;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + 100, y + 30);
        ctx.lineTo(x + 80, y + 80);
        ctx.closePath();
        ctx.strokeStyle = '#4488aa';
        ctx.lineWidth = 1;
        ctx.stroke();
    }
    ctx.restore();
    
    // 远处星光
    ctx.save();
    ctx.globalAlpha = 0.4;
    for (let i = 0; i < 30; i++) {
        let sx = (i * 97 + 13) % canvas.width;
        let sy = (i * 61 + 29) % canvas.height;
        let brightness = 0.3 + Math.sin(frameCount * 0.02 + i) * 0.3;
        ctx.fillStyle = `rgba(200, 220, 255, ${brightness})`;
        ctx.beginPath();
        ctx.arc(sx, sy, 1, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
}

function drawPlayer(timestamp) {
    ctx.save();
    ctx.translate(player.x, player.y);
    
    // 无敌闪烁
    if (player.invincible > 0 && Math.floor(player.invincible / 3) % 2 === 0) {
        ctx.globalAlpha = 0.5;
    }
    
    // 核心光晕
    let glowR = 30 + Math.sin(player.coreGlow) * 5;
    let gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, glowR);
    gradient.addColorStop(0, 'rgba(0, 180, 255, 0.3)');
    gradient.addColorStop(0.5, 'rgba(0, 100, 200, 0.1)');
    gradient.addColorStop(1, 'rgba(0, 50, 150, 0)');
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(0, 0, glowR, 0, Math.PI * 2);
    ctx.fill();
    
    // 身体
    ctx.beginPath();
    ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
    let bodyGrad = ctx.createRadialGradient(0, -5, 0, 0, 0, player.radius);
    bodyGrad.addColorStop(0, '#4488cc');
    bodyGrad.addColorStop(0.7, '#225588');
    bodyGrad.addColorStop(1, '#113355');
    ctx.fillStyle = bodyGrad;
    ctx.fill();
    ctx.strokeStyle = '#66aadd';
    ctx.lineWidth = 2;
    ctx.stroke();
    
    // 星核
    ctx.beginPath();
    ctx.arc(0, 0, 6, 0, Math.PI * 2);
    let coreColor = player.temperature > 50 ? '#00ddff' : 
                    player.temperature > 25 ? '#0088cc' : '#003366';
    ctx.fillStyle = coreColor;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(-2, -2, 2, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    
    // 方向指示
    let angle = Math.atan2(player.lastDir.y, player.lastDir.x);
    ctx.beginPath();
    ctx.moveTo(Math.cos(angle) * (player.radius + 5), Math.sin(angle) * (player.radius + 5));
    ctx.lineTo(Math.cos(angle - 0.3) * (player.radius - 2), Math.sin(angle - 0.3) * (player.radius - 2));
    ctx.lineTo(Math.cos(angle + 0.3) * (player.radius - 2), Math.sin(angle + 0.3) * (player.radius - 2));
    ctx.closePath();
    ctx.fillStyle = '#66ccff';
    ctx.fill();
    
    ctx.restore();
}

function drawEnemy(e, timestamp) {
    ctx.save();
    ctx.translate(e.x, e.y);
    
    // 冻结效果
    if (e.frozen > 0) {
        ctx.beginPath();
        ctx.arc(0, 0, e.radius + 5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(100, 200, 255, 0.15)';
        ctx.fill();
    }
    
    // 被击闪光
    if (e.hitFlash > 0) {
        ctx.beginPath();
        ctx.arc(0, 0, e.radius + 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.fill();
    }
    
    // 身体
    let wobble = Math.sin(e.wobble) * 2;
    ctx.beginPath();
    
    if (e.type === 'frost_slime') {
        // 果冻状
        ctx.ellipse(0, wobble, e.radius + wobble * 0.5, e.radius - wobble * 0.5 + 2, 0, 0, Math.PI * 2);
    } else if (e.type === 'ice_wolf') {
        // 菱形
        ctx.moveTo(0, -e.radius);
        ctx.lineTo(e.radius, 0);
        ctx.lineTo(0, e.radius);
        ctx.lineTo(-e.radius, 0);
        ctx.closePath();
    } else if (e.type === 'snow_golem') {
        // 大圆+小圆
        ctx.arc(0, 3, e.radius, 0, Math.PI * 2);
    } else if (e.type === 'frost_wraith') {
        // 幽灵形状
        ctx.arc(0, -3, e.radius, Math.PI, 0);
        ctx.lineTo(e.radius, e.radius);
        ctx.quadraticCurveTo(e.radius * 0.5, e.radius - 5, 0, e.radius);
        ctx.quadraticCurveTo(-e.radius * 0.5, e.radius - 5, -e.radius, e.radius);
        ctx.closePath();
    } else if (e.isBoss) {
        // Boss - 多边形
        for (let i = 0; i < 8; i++) {
            let a = (Math.PI * 2 / 8) * i + timestamp / 2000;
            let r = e.radius + Math.sin(a * 3 + timestamp / 300) * 5;
            if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
            else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        ctx.closePath();
    } else {
        ctx.arc(0, 0, e.radius, 0, Math.PI * 2);
    }
    
    let fillColor = e.hitFlash > 0 ? '#ffffff' : e.color;
    ctx.fillStyle = fillColor;
    ctx.fill();
    
    if (e.isBoss) {
        ctx.strokeStyle = '#88ccff';
        ctx.lineWidth = 2;
        ctx.stroke();
    }
    
    // 眼睛
    let eyeSize = e.radius * 0.2;
    let eyeDir = Math.atan2(player.y - e.y, player.x - e.x);
    ctx.fillStyle = e.hitFlash > 0 ? '#ff0000' : '#001122';
    ctx.beginPath();
    ctx.arc(-eyeSize * 2 + Math.cos(eyeDir) * 2, -eyeSize + Math.sin(eyeDir) * 2, eyeSize, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(eyeSize * 2 + Math.cos(eyeDir) * 2, -eyeSize + Math.sin(eyeDir) * 2, eyeSize, 0, Math.PI * 2);
    ctx.fill();
    
    // Boss血条
    if (e.isBoss) {
        let barW = 60;
        let barH = 6;
        ctx.fillStyle = '#330000';
        ctx.fillRect(-barW / 2, -e.radius - 15, barW, barH);
        ctx.fillStyle = '#ff3333';
        ctx.fillRect(-barW / 2, -e.radius - 15, barW * (e.hp / e.maxHp), barH);
        ctx.strokeStyle = '#ff6666';
        ctx.lineWidth = 1;
        ctx.strokeRect(-barW / 2, -e.radius - 15, barW, barH);
    }
    
    ctx.restore();
}

function drawProjectile(p) {
    ctx.save();
    ctx.translate(p.x, p.y);
    
    let angle = Math.atan2(p.vy, p.vx);
    ctx.rotate(angle);
    
    // 拖尾
    ctx.beginPath();
    ctx.moveTo(-12, 0);
    ctx.lineTo(0, -3);
    ctx.lineTo(8, 0);
    ctx.lineTo(0, 3);
    ctx.closePath();
    
    let grad = ctx.createLinearGradient(-12, 0, 8, 0);
    grad.addColorStop(0, 'rgba(100, 200, 255, 0)');
    grad.addColorStop(0.5, 'rgba(150, 220, 255, 0.8)');
    grad.addColorStop(1, '#ffffff');
    ctx.fillStyle = grad;
    ctx.fill();
    
    ctx.restore();
}

function drawUI() {
    if (!player) return;
    
    let padding = 15;
    let barW = 200;
    let barH = 16;
    
    // 血条
    ctx.save();
    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.fillRect(padding - 2, padding - 2, barW + 4, barH + 4);
    ctx.fillStyle = '#331111';
    ctx.fillRect(padding, padding, barW, barH);
    let hpRatio = player.hp / player.maxHp;
    let hpColor = hpRatio > 0.5 ? '#33cc66' : hpRatio > 0.25 ? '#ccaa33' : '#cc3333';
    ctx.fillStyle = hpColor;
    ctx.fillRect(padding, padding, barW * hpRatio, barH);
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 1;
    ctx.strokeRect(padding, padding, barW, barH);
    ctx.fillStyle = '#fff';
    ctx.font = '11px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(`HP ${Math.ceil(player.hp)}/${player.maxHp}`, padding + barW / 2, padding + 12);
    
    // 经验条
    let expY = padding + barH + 5;
    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.fillRect(padding - 2, expY - 2, barW + 4, 10 + 4);
    ctx.fillStyle = '#111133';
    ctx.fillRect(padding, expY, barW, 10);
    ctx.fillStyle = '#4488ff';
    ctx.fillRect(padding, expY, barW * (player.exp / player.expToNext), 10);
    ctx.strokeStyle = '#446';
    ctx.strokeRect(padding, expY, barW, 10);
    ctx.fillStyle = '#aaccff';
    ctx.font = '9px Arial';
    ctx.fillText(`Lv.${player.level} EXP ${player.exp}/${player.expToNext}`, padding + barW / 2, expY + 8);
    
    // 温度条
    let tempY = expY + 15;
    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.fillRect(padding - 2, tempY - 2, barW + 4, 10 + 4);
    ctx.fillStyle = '#112233';
    ctx.fillRect(padding, tempY, barW, 10);
    let tempRatio = player.temperature / player.maxTemperature;
    let tempColor;
    if (tempRatio > 0.5) tempColor = '#ff8833';
    else if (tempRatio > 0.25) tempColor = '#cc6622';
    else tempColor = '#4466cc';
    ctx.fillStyle = tempColor;
    ctx.fillRect(padding, tempY, barW * tempRatio, 10);
    ctx.strokeStyle = '#554';
    ctx.strokeRect(padding, tempY, barW, 10);
    ctx.fillStyle = '#ffddaa';
    ctx.font = '9px Arial';
    ctx.fillText(`🌡️ 体温 ${Math.ceil(player.temperature)}/${player.maxTemperature}`, padding + barW / 2, tempY + 8);
    
    // 右上角信息
    ctx.textAlign = 'right';
    ctx.font = '14px Arial';
    ctx.fillStyle = '#88bbdd';
    let rx = canvas.width - padding;
    ctx.fillText(`⏱ ${Math.floor(gameTime / 1000)}s`, rx, padding + 14);
    ctx.fillText(`💀 ${killCount}`, rx, padding + 32);
    ctx.fillText(`🌊 Wave ${waveLevel}`, rx, padding + 50);
    ctx.fillText(`⭐ ${score}`, rx, padding + 68);
    
    // 武器栏
    ctx.textAlign = 'left';
    let weaponY = canvas.height - 50;
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillRect(padding - 5, weaponY - 5, player.weapons.length * 50 + 10, 45);
    player.weapons.forEach((wid, i) => {
        let stats = WEAPON_DATA[wid];
        let lv = player.weaponLevels[wid] || 1;
        let wx = padding + i * 50;
        
        ctx.strokeStyle = '#335577';
        ctx.lineWidth = 1;
        ctx.strokeRect(wx, weaponY, 40, 35);
        
        ctx.font = '20px Arial';
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.fillText(stats.icon, wx + 20, weaponY + 22);
        
        ctx.font = '9px Arial';
        ctx.fillStyle = '#88aacc';
        ctx.fillText(`Lv${lv}`, wx + 20, weaponY + 34);
    });
    
    ctx.restore();
}

// ==================== 游戏控制 ====================
function startGame() {
    player = createPlayer();
    enemies = [];
    projectiles = [];
    particles = [];
    damageNumbers = [];
    expOrbs = [];
    blizzardZones = [];
    weaponTimers = {};
    gameTime = 0;
    score = 0;
    killCount = 0;
    waveLevel = 1;
    frameCount = 0;
    screenShake = 0;
    
    initSnowflakes();
    
    gameState = 'playing';
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('death-screen').style.display = 'none';
    document.getElementById('level-up-panel').style.display = 'none';
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

// 支持按空格开始
window.addEventListener('keydown', e => {
    if (e.code === 'Space') {
        if (gameState === 'menu') startGame();
        else if (gameState === 'dead') startGame();
    }
});

// 初始化并开始
initSnowflakes();
requestAnimationFrame(gameLoop);
</script>
</body>
